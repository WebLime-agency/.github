name: Claude Code (reusable)

# Optional companion to the review workflow — the @claude responder for issues
# and PR comments. Enrolled only when you pass --with-mention to rollout.sh.
# Note the broader surface: anyone who can comment can trigger a run that draws
# on the same subscription limits.
#
# Auth matches the review workflow (CLAUDE_CODE_OAUTH_TOKEN); switch to
# anthropic_api_key here too if you move to pay-as-you-go.

on:
  workflow_call: {}

concurrency:
  group: claude-code-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: [self-hosted, Linux, X64, weblime-ci]
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
