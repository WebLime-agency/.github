name: Vercel Preview Build (reusable)

# Central reusable workflow — lives in WebLime-agency/.github.
# Per-repo callers own the pull_request trigger; this keeps the tokenless
# preview build logic in one place while preserving repo-specific variables.

on:
  workflow_call:
    inputs:
      preview_base_branch:
        description: "Branch the caller should trigger preview builds against."
        required: false
        type: string
        default: dev
      node_version_file:
        description: "Path to the Node.js version file."
        required: false
        type: string
        default: .node-version

permissions:
  contents: read

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-preview:
    name: Build Vercel preview output
    runs-on: [self-hosted, Linux, X64, weblime-ci]
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node_version_file }}

      - name: Install dependencies
        run: npm ci

      - name: Inject repo/org Variables into build env
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: |
          set -euo pipefail
          # Repo-agnostic: export every repository/organization Variable (non-secret
          # config, including each repo's own PUBLIC_* build vars) into the build
          # environment. Secrets are NOT part of the `vars` context, so the build
          # stays tokenless. Values are read from an env var (never interpolated into
          # the shell) and single-line config values are expected.
          node -e '
            const fs = require("fs");
            const vars = JSON.parse(process.env.VARS_JSON || "{}");
            const lines = Object.entries(vars).map(([k, v]) => `${k}=${v}`);
            if (lines.length) fs.appendFileSync(process.env.GITHUB_ENV, lines.join("\n") + "\n");
          '

      - name: Build Vercel output
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Verify Vercel output
        run: |
          set -euo pipefail

          test -d .vercel/output
          test -f .vercel/output/config.json

          if ! find .vercel/output -mindepth 1 -maxdepth 1 | grep -q .; then
            echo ".vercel/output is empty."
            exit 1
          fi

      - name: Write PR number
        run: printf '%s\n' '${{ github.event.pull_request.number }}' > pr-number.txt

      - name: Package Vercel output
        run: |
          set -euo pipefail

          tar -czf vercel-preview-output.tar.gz .vercel/output
          tar -tzf vercel-preview-output.tar.gz > vercel-preview-output-contents.txt
          grep -Fxq '.vercel/output/config.json' vercel-preview-output-contents.txt

      - name: Upload Vercel output
        uses: actions/upload-artifact@v4
        with:
          name: vercel-preview-output
          path: |
            vercel-preview-output.tar.gz
            pr-number.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
